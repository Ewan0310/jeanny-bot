<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Jeanny Companion 💕</title>
    <link rel="stylesheet" href="/webapp/style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <span class="header-emoji">💕</span>
            <span class="header-title">Jeanny</span>
            <span class="header-mood" id="mood-text">😊 Happy</span>
        </div>

        <!-- Character Area -->
        <div class="character-area">
            <div class="character" id="character">
                <div class="char-body">
                    <!-- Face -->
                    <div class="face" id="face">
                        <div class="hair"></div>
                        <div class="eye left-eye" id="leftEye">
                            <div class="pupil"></div>
                        </div>
                        <div class="eye right-eye" id="rightEye">
                            <div class="pupil"></div>
                        </div>
                        <div class="mouth" id="mouth"></div>
                        <div class="blush left-blush"></div>
                        <div class="blush right-blush"></div>
                    </div>
                </div>
                <!-- Speech Bubble -->
                <div class="speech-bubble" id="speechBubble">
                    <p id="bubbleText">Hai abang! 💕</p>
                </div>
            </div>
            <!-- Floating Hearts -->
            <div class="hearts-container" id="heartsContainer"></div>
        </div>

        <!-- Chat Area -->
        <div class="chat-area" id="chatArea">
            <div class="chat-box" id="chat-box"></div>
        </div>

        <!-- Input Area with MIC BUTTON -->
        <div class="input-area">
            <input type="text" id="chat-input" placeholder="Cakap dengan Jeanny..." autocomplete="off">
            <button id="mic-btn" title="Cakap">🎤</button>
            <button id="send-btn" title="Hantar">
                <span>💕</span>
            </button>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="/webapp/app.js"></script>
</body>
</html>
